version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lifestream-postgres
    environment:
      POSTGRES_USER: lifestream
      POSTGRES_PASSWORD: lifestream
      POSTGRES_DB: lifestream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifestream"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifestream-network

  redis:
    image: redis:7-alpine
    container_name: lifestream-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifestream-network

volumes:
  postgres_data:
  redis_data:

networks:
  lifestream-network:
    driver: bridge
